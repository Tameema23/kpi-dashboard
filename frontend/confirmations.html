<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/static/images/ApexTrack.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ApexTrack">
  <link rel="apple-touch-icon" href="/static/images/ApexTrack.png">
  <meta name="api-base" content="https://data-log.onrender.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://data-log.onrender.com">
  <link rel="stylesheet" href="/static/style.css?v=5">
  <title>Confirmations — ApexTrack</title>
  <style>
    .conf-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    .conf-date-label {
      font-size: 22px;
      font-weight: 900;
      color: #0f172a;
      letter-spacing: -0.5px;
    }
    .conf-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: 3px;
    }
    .conf-refresh-info {
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .conf-refresh-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse-dot 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .conf-date-picker {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .cal-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1.5px solid #dbeafe;
      font-size: 13px;
      font-weight: 700;
      color: #1e3a8a;
      background: #eff6ff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .cal-trigger:hover { background: #dbeafe; border-color: #bfdbfe; }
    .cal-trigger svg { color: #2563eb; flex-shrink: 0; }

    .cal-popover {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 300px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(15,23,42,0.18), 0 2px 8px rgba(15,23,42,0.08);
      overflow: hidden;
      z-index: 50;
      opacity: 0;
      transform: translateY(-8px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }
    .cal-popover.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .cal-header {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      padding: 18px 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cal-title {
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .cal-nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .cal-nav-btn:hover { background: rgba(255,255,255,0.28); }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 14px 12px 4px;
      gap: 2px;
    }
    .cal-weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 0.5px;
      padding: 4px 0;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0 12px 14px;
      gap: 2px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: background 0.12s, color 0.12s, transform 0.08s;
    }
    .cal-day:hover:not(.cal-day-empty):not(.cal-day-selected) { background: #eff6ff; color: #1d4ed8; }
    .cal-day:active:not(.cal-day-empty) { transform: scale(0.9); }
    .cal-day-empty { cursor: default; pointer-events: none; }
    .cal-day-today:not(.cal-day-selected) {
      color: #2563eb;
      font-weight: 800;
      box-shadow: inset 0 0 0 1.5px #bfdbfe;
    }
    .cal-day-selected {
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 2px 8px rgba(37,99,235,0.4);
    }

    .cal-footer {
      border-top: 1px solid #f1f5f9;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cal-today-btn {
      font-size: 12px;
      font-weight: 700;
      color: #2563eb;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.12s;
    }
    .cal-today-btn:hover { background: #eff6ff; }
    .cal-selected-label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
    }

    @media (max-width: 600px) {
      .cal-popover { right: auto; left: 0; width: 290px; }
    }

    /* Summary bar */
    .conf-summary {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .conf-stat {
      flex: 1;
      min-width: 100px;
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      border: 1.5px solid #f1f5f9;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      text-align: center;
    }
    .conf-stat-num {
      font-size: 26px;
      font-weight: 900;
      color: #0f172a;
      line-height: 1;
    }
    .conf-stat-label {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .conf-stat-num.green  { color: #15803d; }
    .conf-stat-num.amber  { color: #d97706; }
    .conf-stat-num.slate  { color: #475569; }

    /* Appointment rows */
    .conf-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .conf-row {
      background: white;
      border-radius: 14px;
      padding: 16px 18px;
      border: 1.5px solid #f1f5f9;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      transition: border-color 0.2s;
    }
    .conf-row.status-confirmed  { border-color: #bbf7d0; background: #f0fdf4; }
    .conf-row.status-rescheduled { border-color: #fde68a; background: #fffbeb; }
    .conf-row.status-no_show    { border-color: #fecaca; background: #fff1f2; }
    .conf-row.status-cancelled  { border-color: #e2e8f0; background: #f8fafc; opacity: 0.7; }

    .conf-row-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }
    .conf-time-badge {
      background: #eff6ff;
      color: #2563eb;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 72px;
      text-align: center;
    }
    .conf-name {
      font-size: 16px;
      font-weight: 800;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conf-phone {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
      font-weight: 500;
    }
    .conf-sms-badges {
      display: flex;
      gap: 5px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .conf-sms-badge {
      font-size: 10px;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 6px;
    }
    .conf-sms-badge.sent    { background: #dbeafe; color: #1d4ed8; }
    .conf-sms-badge.unsent  { background: #f1f5f9; color: #94a3b8; }

    /* Status pill + dropdown */
    .conf-row-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-pill.pending      { background: #f1f5f9; color: #64748b; }
    .status-pill.confirmed    { background: #dcfce7; color: #15803d; }
    .status-pill.rescheduled  { background: #fef9c3; color: #a16207; }
    .status-pill.no_show      { background: #fee2e2; color: #b91c1c; }
    .status-pill.cancelled    { background: #f1f5f9; color: #94a3b8; }

    .conf-status-select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1.5px solid #e2e8f0;
      font-size: 12px;
      font-weight: 600;
      color: #0f172a;
      background: #f8fafc;
      cursor: pointer;
    }

    /* Empty state */
    .conf-empty {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
      font-size: 15px;
      font-weight: 600;
    }
    .conf-empty svg {
      display: block;
      margin: 0 auto 14px;
      opacity: 0.3;
    }

    /* Test button */
    .conf-test-btn {
      font-size: 12px;
      background: #f1f5f9;
      color: #475569;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .conf-test-btn:hover { background: #e2e8f0; }

    /* Primary action buttons — clearly separated, independent actions */
    .conf-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .conf-action-btn {
      font-size: 13px;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1.5px solid transparent;
      transition: transform 0.08s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .conf-action-btn:active { transform: scale(0.97); }
    .conf-action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .conf-action-primary {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 1px 3px rgba(37,99,235,0.3);
    }
    .conf-action-primary:hover:not(:disabled) { background: #1d4ed8; }
    .conf-action-summary {
      background: #ecfdf5;
      color: #047857;
      border-color: #a7f3d0;
    }
    .conf-action-summary:hover:not(:disabled) { background: #d1fae5; }
    .conf-setup-row {
      display: flex;
      justify-content: flex-end;
    }

    @media (max-width: 600px) {
      .conf-actions { width: 100%; }
      .conf-action-btn { flex: 1; justify-content: center; }
    }

    @media (max-width: 600px) {
      .conf-row { flex-direction: column; align-items: flex-start; }
      .conf-row-right { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">
      <img src="/static/images/ApexTrack.png" alt="ApexTrack"
        style="width:28px;height:28px;object-fit:contain;border-radius:6px;">
      ApexTrack
    </span>
  </div>
  <div class="topbar-right">
    <span class="topbar-user">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span id="username-text"></span>
    </span>
    <button class="logout" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="page">

  <div class="conf-header">
    <div>
      <div class="conf-date-label" id="confDateLabel">Today's Appointments</div>
      <div class="conf-subtitle">Hazem's schedule — confirmation status</div>
      <div class="conf-refresh-info">
        <span class="conf-refresh-dot"></span>
        Auto-refreshes every 30 seconds
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
      <div class="conf-date-picker">
        <label style="font-size:12px;font-weight:700;color:#64748b;">Date:</label>
        <input type="hidden" id="confDateInput">
        <button type="button" class="cal-trigger" id="calTrigger" onclick="toggleCalendar(event)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span id="calTriggerLabel">Select date</span>
        </button>
        <div class="cal-popover" id="calPopover">
          <div class="cal-header">
            <button type="button" class="cal-nav-btn" onclick="calPrevMonth(event)" aria-label="Previous month">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="cal-title" id="calTitle">—</div>
            <button type="button" class="cal-nav-btn" onclick="calNextMonth(event)" aria-label="Next month">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div class="cal-weekdays">
            <div class="cal-weekday">SUN</div><div class="cal-weekday">MON</div><div class="cal-weekday">TUE</div>
            <div class="cal-weekday">WED</div><div class="cal-weekday">THU</div><div class="cal-weekday">FRI</div>
            <div class="cal-weekday">SAT</div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
          <div class="cal-footer">
            <span class="cal-selected-label" id="calSelectedLabel"></span>
            <button type="button" class="cal-today-btn" onclick="calJumpToday(event)">Today</button>
          </div>
        </div>
      </div>
      <div class="conf-actions">
        <button class="conf-action-btn conf-action-primary" onclick="sendConfirmationTexts()"
                title="Send appointment confirmation texts to clients on the selected date only">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Send Confirmation Texts
        </button>
        <button class="conf-action-btn conf-action-summary" onclick="sendSummaryText()"
                title="Send the appointment summary text for the selected date">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
          </svg>
          Send Summary Text
        </button>
      </div>
      <div class="conf-setup-row">
        <button class="conf-test-btn" onclick="registerWebhook()"
                title="One-time setup: register inbound SMS webhook so YES replies auto-confirm">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          Register Webhook
        </button>
      </div>
    </div>
  </div>

  <!-- Summary stats -->
  <div class="conf-summary">
    <div class="conf-stat">
      <div class="conf-stat-num slate" id="statTotal">—</div>
      <div class="conf-stat-label">Total</div>
    </div>
    <div class="conf-stat">
      <div class="conf-stat-num green" id="statConfirmed">—</div>
      <div class="conf-stat-label">Confirmed</div>
    </div>
    <div class="conf-stat">
      <div class="conf-stat-num amber" id="statPending">—</div>
      <div class="conf-stat-label">Pending</div>
    </div>
    <div class="conf-stat">
      <div class="conf-stat-num" style="color:#d97706;" id="statRescheduled">—</div>
      <div class="conf-stat-label">Rescheduled</div>
    </div>
    <div class="conf-stat">
      <div class="conf-stat-num" style="color:#b91c1c;" id="statNoShow">—</div>
      <div class="conf-stat-label">No Show</div>
    </div>
    <div class="conf-stat">
      <div class="conf-stat-num" style="color:#94a3b8;" id="statCancelled">—</div>
      <div class="conf-stat-label">Cancelled</div>
    </div>
  </div>

  <!-- Appointment list -->
  <div class="conf-list" id="confList">
    <div class="conf-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Loading appointments…
    </div>
  </div>

</div>

<script src="/static/app.js?v=5"></script>
<script>
(function() {

  // ── Auth guard — admins + users with can_confirmations ────────
  var username = localStorage.getItem("username") || "";
  var role     = localStorage.getItem("role") || "";
  var canConfirmations = localStorage.getItem("can_confirmations") === "1";
  if (role !== "admin" && !canConfirmations) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;flex-direction:column;gap:12px;">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' +
      '<div style="font-size:18px;font-weight:800;color:#0f172a;">Access Denied</div>' +
      '<div style="font-size:14px;color:#64748b;">This page is restricted.</div>' +
      '<a href="/" style="margin-top:8px;color:#2563eb;font-weight:600;font-size:13px;">← Back to login</a>' +
      '</div>';
    return;
  }

  document.getElementById("username-text").innerText = username;

  // ── Date setup ────────────────────────────────────────────────
  var today = new Date().toLocaleDateString("en-CA");
  document.getElementById("confDateInput").value = today;

  // ── Custom calendar widget ────────────────────────────────────
  // The hidden #confDateInput (YYYY-MM-DD) remains the single source of
  // truth; the calendar just reads and writes it, then calls loadConfirmations.
  var MONTH_NAMES = ["January","February","March","April","May","June",
                     "July","August","September","October","November","December"];

  // Parse the currently-selected date into a viewing month/year
  function _selectedParts() {
    var v = document.getElementById("confDateInput").value || today;
    var p = v.split("-");
    return { y: parseInt(p[0]), m: parseInt(p[1]) - 1, d: parseInt(p[2]) };
  }
  var _calView = (function() {
    var s = _selectedParts();
    return { year: s.y, month: s.m };  // month is 0-indexed
  })();

  function _pad(n) { return n < 10 ? "0" + n : "" + n; }

  function calRender() {
    var grid = document.getElementById("calGrid");
    document.getElementById("calTitle").innerText =
      MONTH_NAMES[_calView.month] + " " + _calView.year;

    var firstDay = new Date(_calView.year, _calView.month, 1).getDay(); // 0=Sun
    var daysInMonth = new Date(_calView.year, _calView.month + 1, 0).getDate();
    var sel = document.getElementById("confDateInput").value;

    var cells = "";
    // Leading empty cells
    for (var i = 0; i < firstDay; i++) {
      cells += '<div class="cal-day cal-day-empty"></div>';
    }
    for (var day = 1; day <= daysInMonth; day++) {
      var iso = _calView.year + "-" + _pad(_calView.month + 1) + "-" + _pad(day);
      var cls = "cal-day";
      if (iso === today) cls += " cal-day-today";
      if (iso === sel)   cls += " cal-day-selected";
      cells += '<button type="button" class="' + cls + '" onclick="calPick(\'' + iso + '\')">' + day + '</button>';
    }
    grid.innerHTML = cells;

    // Footer label
    var lbl = document.getElementById("calSelectedLabel");
    if (sel) {
      var d = new Date(sel + "T00:00:00");
      lbl.innerText = d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    } else {
      lbl.innerText = "";
    }
  }

  function calSyncTriggerLabel() {
    var v = document.getElementById("confDateInput").value;
    var span = document.getElementById("calTriggerLabel");
    if (!v) { span.innerText = "Select date"; return; }
    var d = new Date(v + "T00:00:00");
    var isToday = v === today;
    var formatted = d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    span.innerText = isToday ? "Today · " + formatted : formatted;
  }

  window.toggleCalendar = function(e) {
    if (e) e.stopPropagation();
    var pop = document.getElementById("calPopover");
    var isOpen = pop.classList.contains("open");
    if (isOpen) {
      pop.classList.remove("open");
    } else {
      // Re-sync view to the selected date each time it opens
      var s = _selectedParts();
      _calView = { year: s.y, month: s.m };
      calRender();
      pop.classList.add("open");
    }
  };

  window.calPrevMonth = function(e) {
    if (e) e.stopPropagation();
    _calView.month--;
    if (_calView.month < 0) { _calView.month = 11; _calView.year--; }
    calRender();
  };

  window.calNextMonth = function(e) {
    if (e) e.stopPropagation();
    _calView.month++;
    if (_calView.month > 11) { _calView.month = 0; _calView.year++; }
    calRender();
  };

  window.calPick = function(iso) {
    document.getElementById("confDateInput").value = iso;
    calSyncTriggerLabel();
    document.getElementById("calPopover").classList.remove("open");
    loadConfirmations();
  };

  window.calJumpToday = function(e) {
    if (e) e.stopPropagation();
    var s = today.split("-");
    _calView = { year: parseInt(s[0]), month: parseInt(s[1]) - 1 };
    calPick(today);
  };

  // Close the calendar when clicking outside it
  document.addEventListener("click", function(e) {
    var picker = document.querySelector(".conf-date-picker");
    var pop = document.getElementById("calPopover");
    if (pop && pop.classList.contains("open") && picker && !picker.contains(e.target)) {
      pop.classList.remove("open");
    }
  });

  // Initialise the trigger label
  calSyncTriggerLabel();

  function fmtDateLabel(dateStr) {
    var d = new Date(dateStr + "T00:00:00");
    var isToday = dateStr === today;
    var label = d.toLocaleDateString("en-US", {
      weekday: "long", month: "long", day: "numeric"
    });
    return isToday ? "Today — " + label : label;
  }

  function fmtTime(iso) {
    if (!iso || !iso.includes("T")) return "?";
    var parts = iso.split("T")[1].split(":");
    var h    = parseInt(parts[0]);
    var m    = parts[1];
    var ampm = h >= 12 ? "PM" : "AM";
    var h12  = h % 12 || 12;
    return h12 + ":" + m + " " + ampm;
  }

  // ── Load confirmations ────────────────────────────────────────
  window.loadConfirmations = async function() {
    var dateVal = document.getElementById("confDateInput").value || today;
    document.getElementById("confDateLabel").innerText = fmtDateLabel(dateVal);

    try {
      var res = await fetch("/confirmations?date=" + dateVal, {
        headers: { Authorization: "Bearer " + TOKEN }
      });
      if (res.status === 403) {
        showToast("Access denied.", "error");
        return;
      }
      if (!res.ok) { showToast("Failed to load.", "error"); return; }
      var appts = await res.json();
      renderList(appts);
      updateStats(appts);
    } catch(e) {
      console.error(e);
      showToast("Server error.", "error");
    }
  };

  function updateStats(appts) {
    // Confirmed = sms_status OR appt_status is confirmed
    var confirmed   = appts.filter(function(a) {
      return a.sms_status === "confirmed" || a.appt_status === "confirmed";
    }).length;
    var rescheduled = appts.filter(function(a) {
      return a.sms_status === "rescheduled" || a.appt_status === "rescheduled";
    }).length;
    var no_show     = appts.filter(function(a) {
      return a.appt_status === "no_show";
    }).length;
    var cancelled   = appts.filter(function(a) {
      return a.appt_status === "cancelled";
    }).length;
    var pending     = appts.filter(function(a) {
      var sms  = a.sms_status  || "";
      var appt = a.appt_status || "";
      return sms === "" && appt === "";
    }).length;
    document.getElementById("statTotal").innerText       = appts.length;
    document.getElementById("statConfirmed").innerText   = confirmed;
    document.getElementById("statPending").innerText     = pending;
    document.getElementById("statRescheduled").innerText = rescheduled;
    document.getElementById("statNoShow").innerText      = no_show;
    document.getElementById("statCancelled").innerText   = cancelled;
  }

  function renderList(appts) {
    var list = document.getElementById("confList");
    if (!appts || appts.length === 0) {
      list.innerHTML = '<div class="conf-empty">' +
        '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
          '<rect x="3" y="4" width="18" height="18" rx="2"/>' +
          '<line x1="16" y1="2" x2="16" y2="6"/>' +
          '<line x1="8" y1="2" x2="8" y2="6"/>' +
          '<line x1="3" y1="10" x2="21" y2="10"/>' +
        '</svg>' +
        'No appointments scheduled for this date.' +
      '</div>';
      return;
    }

    list.innerHTML = appts.map(function(a) {
      var smsStatus  = a.sms_status  || "";
      var apptStatus = a.appt_status || "";

      // Combined display status — appt_status (set by Hazem) takes priority over sms_status
      // except confirmed: either field being confirmed shows as confirmed
      var displayStatus;
      if (apptStatus === "no_show")    displayStatus = "no_show";
      else if (apptStatus === "cancelled")  displayStatus = "cancelled";
      else if (apptStatus === "rescheduled" || smsStatus === "rescheduled") displayStatus = "rescheduled";
      else if (apptStatus === "confirmed"   || smsStatus === "confirmed")   displayStatus = "confirmed";
      else displayStatus = "";

      var rowClass = displayStatus ? "conf-row status-" + displayStatus : "conf-row";
      var noPhone  = !a.phone_number;

      // Status pill label for appt_status (manually set by Hazem on planner)
      var apptBadge = "";
      if (apptStatus === "no_show") {
        apptBadge = '<span style="font-size:10px;font-weight:700;background:#fee2e2;color:#b91c1c;border-radius:4px;padding:2px 6px;margin-left:4px;">NS</span>';
      } else if (apptStatus === "cancelled") {
        apptBadge = '<span style="font-size:10px;font-weight:700;background:#f1f5f9;color:#64748b;border-radius:4px;padding:2px 6px;margin-left:4px;">CXL</span>';
      } else if (apptStatus === "rescheduled") {
        apptBadge = '<span style="font-size:10px;font-weight:700;background:#fef9c3;color:#a16207;border-radius:4px;padding:2px 6px;margin-left:4px;">RS</span>';
      } else if (apptStatus === "confirmed") {
        apptBadge = '<span style="font-size:10px;font-weight:700;background:#dcfce7;color:#15803d;border-radius:4px;padding:2px 6px;margin-left:4px;">✓ Planner</span>';
      }

      var smsBadges = noPhone
        ? '<div style="font-size:11px;color:#f59e0b;font-weight:600;margin-top:3px;">⚠ No phone number</div>'
        : '<div class="conf-sms-badges">' +
            '<span class="conf-sms-badge ' + (a.sms_sent_evening ? "sent" : "unsent") + '">Evening ' + (a.sms_sent_evening ? "✓" : "–") + '</span>' +
            '<span class="conf-sms-badge ' + (a.sms_sent_morning ? "sent" : "unsent") + '">Morning '  + (a.sms_sent_morning ? "✓" : "–") + '</span>' +
          '</div>';

      // SMS status dropdown — what Tameema can set (sms_status field)
      var selVal = smsStatus;
      var dropdown =
        '<select class="conf-status-select" onchange="setStatus(' + a.id + ', this.value)">' +
          '<option value=""'             + (selVal === ""            ? " selected" : "") + '>— Pending</option>' +
          '<option value="confirmed"'    + (selVal === "confirmed"   ? " selected" : "") + '>✓ Confirmed (SMS)</option>' +
          '<option value="rescheduled"'  + (selVal === "rescheduled" ? " selected" : "") + '>↻ Rescheduled</option>' +
        '</select>';

      return '<div class="' + rowClass + '" id="row-' + a.id + '">' +
        '<div class="conf-row-left">' +
          '<div class="conf-time-badge">' + fmtTime(a.scheduled_for) + '</div>' +
          '<div>' +
            '<div class="conf-name">' + esc(a.lead_name) + apptBadge + '</div>' +
            '<div class="conf-phone">' + (a.phone_number || "No phone") + '</div>' +
            smsBadges +
          '</div>' +
        '</div>' +
        '<div class="conf-row-right">' +
          dropdown +
        '</div>' +
      '</div>';
    }).join("");
  }

  function esc(str) {
    return String(str || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── Set status manually ───────────────────────────────────────
  window.setStatus = async function(apptId, status) {
    try {
      var res = await fetch("/confirmations/" + apptId + "/status", {
        method: "PATCH",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + TOKEN },
        body: JSON.stringify({ status: status })
      });
      if (res.ok) {
        showToast(status ? "Status set to " + status + "." : "Status cleared.");
        loadConfirmations(); // refresh list
      } else {
        showToast("Failed to update.", "error");
      }
    } catch(e) { showToast("Server error.", "error"); }
  };

  // ── Register webhook ──────────────────────────────────────────
  window.registerWebhook = async function() {
    try {
      var res = await fetch("/rc/register-webhook", {
        method: "POST",
        headers: { Authorization: "Bearer " + TOKEN }
      });
      var data = await res.json();
      if (res.ok) {
        showToast("Webhook registered! YES replies will now auto-confirm.");
        console.log("Webhook details:", data);
      } else {
        showToast("Failed: " + (data.detail || "Unknown error"), "error");
      }
    } catch(e) { showToast("Server error.", "error"); }
  };

  // ── Send Confirmation Texts — selected date only, independent ──
  window.sendConfirmationTexts = async function() {
    var dateVal = document.getElementById("confDateInput").value || today;
    var btn = document.querySelector(".conf-action-primary");
    if (btn) { btn.disabled = true; }
    try {
      var res = await fetch("/rc/send-confirmation-texts", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + TOKEN
        },
        body: JSON.stringify({ date: dateVal })
      });
      var data = await res.json();
      if (res.ok) {
        var n = (data.sent != null) ? data.sent : 0;
        showToast("Confirmation texts sent for " + dateVal + " (" + n + " client" + (n === 1 ? "" : "s") + ").");
        loadConfirmations();
      } else {
        showToast(data.detail || "Failed to send confirmation texts.", "error");
      }
    } catch(e) {
      showToast("Server error.", "error");
    } finally {
      if (btn) { btn.disabled = false; }
    }
  };

  // ── Send Summary Text — selected date only, independent ──
  window.sendSummaryText = async function() {
    var dateVal = document.getElementById("confDateInput").value || today;
    var btn = document.querySelector(".conf-action-summary");
    if (btn) { btn.disabled = true; }
    try {
      var res = await fetch("/rc/send-summary", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + TOKEN
        },
        body: JSON.stringify({ date: dateVal })
      });
      var data = await res.json();
      if (res.ok && data.status === "sent") {
        showToast("Summary text sent for " + data.date + ".");
      } else if (res.ok && data.status === "no_appointments") {
        showToast("No appointments found for " + data.date + ".", "error");
      } else {
        showToast(data.detail || "Failed to send summary.", "error");
      }
    } catch(e) {
      showToast("Server error.", "error");
    } finally {
      if (btn) { btn.disabled = false; }
    }
  };

  // ── Auto-refresh every 30 seconds ─────────────────────────────
  loadConfirmations();
  setInterval(loadConfirmations, 30000);

})();
</script>
</body>
</html>
