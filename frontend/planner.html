<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KPI Dashboard">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="api-base" content="https://data-log.onrender.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://data-log.onrender.com">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="/static/style.css">
  <title>Weekly Planner</title>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      KPI Dashboard
    </span>
    <nav class="topbar-nav">
      <a href="/index.html"     class="admin-only">Home</a>
      <a href="/log.html"       class="admin-only">Log Day</a>
      <a href="/reports.html"   class="admin-only">Reports</a>
      <a href="/history.html"   class="admin-only">History</a>
      <a href="/planner.html"   class="active">Planner</a>
      <a href="/quality.html"   class="admin-only">Quality</a>
      <a href="/referrals.html" class="admin-only">Referrals</a>
      <a href="/settings.html"  class="assistant-visible">Settings</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span class="topbar-user">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span id="username-text"></span>
    </span>
    <button class="logout" onclick="logout()">Sign Out</button>
  </div>
</div>

<!-- ── Page ─────────────────────────────────────────────── -->
<div class="page" style="padding-bottom: 60px;">

  <a class="back admin-only" onclick="location.href='/index.html'">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Dashboard
  </a>

  <div class="planner-header">
    <div class="planner-week-nav">
      <button class="planner-nav-btn" id="prevWeekBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="planner-week-label" id="weekLabel">Week</div>
      <button class="planner-nav-btn" id="nextWeekBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <button class="btn small" id="todayBtn">Today</button>
    <button class="btn" id="newApptBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Appointment
    </button>
  </div>

  <!-- Search bar -->
  <div class="planner-search-bar" id="plannerSearchBar">
    <div class="planner-search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" style="flex-shrink:0;">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="apptSearchInput" type="text" placeholder="Search appointments by name..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="apptSearchClear" class="search-clear-btn" style="display:none;" title="Clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="apptSearchResults" class="search-results-dropdown" style="display:none;"></div>
  </div>

  <!-- Appointment count summary bar -->
  <div id="plannerSummary" class="planner-summary">
    <span class="planner-summary-label">Loading...</span>
  </div>

  <!-- Days Off panel hidden — day blocking done by clicking column headers -->
  <div id="daysOffPanel" style="display:none;"></div>
  <!-- Admin hint bar: only shown to admin role via JS -->
  <div id="adminBlockHint" class="admin-block-hint" style="display:none;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Tip: Click a day column header to mark it as a day off every week
  </div>

  <div class="planner-wrap">
    <div class="planner-grid" id="plannerGrid"></div>
  </div>

</div>

<!-- ── Appointment modal ─────────────────────────────────── -->
<div class="modal-backdrop hidden" id="modalBackdrop">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">New Appointment</h3>
      <button class="modal-close" id="modalCloseBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">

      <div class="form-field">
        <label>Lead Name <span style="color:#dc2626">*</span></label>
        <input id="m_lead_name" placeholder="Enter lead name" type="text">
      </div>

      <div class="form-field">
        <label>Type</label>
        <div style="display:flex;gap:10px;">
          <label id="type_appt_label" style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:2px solid #3b82f6;background:#eff6ff;cursor:pointer;font-size:14px;font-weight:600;color:#1d4ed8;transition:all 0.15s;">
            <input type="radio" name="m_appt_type" id="type_appt" value="appointment" checked style="accent-color:#3b82f6;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Appointment
          </label>
          <label id="type_cb_label" style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:2px solid #e2e8f0;background:#fafafa;cursor:pointer;font-size:14px;font-weight:600;color:#64748b;transition:all 0.15s;">
            <input type="radio" name="m_appt_type" id="type_cb" value="callback" style="accent-color:#f59e0b;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            Call Back
          </label>
        </div>
      </div>

      <div class="form-field">
        <label>Appointment Date &amp; Time <span style="font-size:11px;font-weight:500;color:#94a3b8;">(7:00 AM – 9:00 PM)</span></label>
        <div class="datetime-row">
          <input id="m_date" type="date">
          <input id="m_time" type="time" step="900" min="07:00" max="21:00">
        </div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
          <label style="font-size:12px;font-weight:600;color:#64748b;margin:0;white-space:nowrap;">Time zone:</label>
          <select id="m_timezone" style="flex:1;padding:7px 10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;font-weight:600;color:#0f172a;background:#fafafa;cursor:pointer;">
            <option value="America/Edmonton" selected>Mountain (Calgary) &#x2014; default</option>
            <option value="America/Vancouver">Pacific (PT)</option>
            <option value="America/Winnipeg">Central (CT)</option>
            <option value="America/Toronto">Eastern (ET)</option>
            <option value="America/Halifax">Atlantic (AT)</option>
            <option value="America/St_Johns">Newfoundland (NT)</option>
          </select>
        </div>
        <div id="tz_preview" style="display:none;margin-top:6px;padding:6px 10px;background:#eff6ff;border-radius:8px;font-size:12px;font-weight:600;color:#2563eb;"></div>
      </div>

      <!-- Mini calendar -->
      <div class="mini-cal-wrap">
        <div class="mini-cal-header">
          <button type="button" id="calPrevBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span id="calMonthLabel"></span>
          <button type="button" id="calNextBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="mini-cal-grid" id="miniCalGrid"></div>
      </div>

      <!-- Reschedule history (edit mode only) -->
      <div id="m_history_wrap" style="display:none;margin-bottom:2px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">Reschedule History</span>
          </div>
          <span id="m_reschedule_count" style="font-size:11px;font-weight:700;background:#eff6ff;color:#2563eb;padding:2px 8px;border-radius:20px;"></span>
        </div>
        <div id="m_history_entries" style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:2px;"></div>
        <div style="height:1px;background:#f1f5f9;margin:12px 0 10px;"></div>
      </div>

      <div class="form-field">
        <label id="m_comments_label">Comments / Notes</label>
        <textarea id="m_comments" rows="3" placeholder="Add a note..."></textarea>
      </div>

      <div class="modal-booked-at hidden" id="modalBookedAt">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Booked at: <span id="modalBookedAtVal"></span>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn" style="background:#f1f5f9;color:#475569;" id="modalCancelBtn">Cancel</button>
      <button class="btn" id="modalSaveBtn">Save Appointment</button>
      <button class="btn" id="modalDeleteBtn" style="background:#ef4444;display:none;">Delete</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="appt-tooltip hidden" id="apptTooltip"></div>

<!-- ── Bottom nav ───────────────────────────────────────── -->
<nav class="bottom-nav" id="adminBottomNav">
  <div class="bottom-nav-items">
    <a href="/index.html"     class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
    </a>
    <a href="/log.html"       class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Log
    </a>
    <a href="/reports.html"   class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reports
    </a>
    <a href="/planner.html"   class="bottom-nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Planner
    </a>
    <a href="/quality.html"   class="bottom-nav-item admin-only">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Quality
    </a>
    <a href="/settings.html"  class="bottom-nav-item assistant-visible">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings
    </a>
  </div>
</nav>

<!-- app.js must load first (provides TOKEN, API, showToast, showConfirm, etc.) -->
<script src="/static/app.js?v=2"></script>
<!-- planner.js contains all planner logic -->
<script src="/static/planner.js?v=2"></script>
</body>
</html>
