<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KPI Dashboard">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="api-base" content="https://data-log.onrender.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://data-log.onrender.com">
  <link rel="stylesheet" href="/static/style.css">
  <title>Referral Program</title>
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      KPI Dashboard
    </span>
    <nav class="topbar-nav">
      <a href="/index.html"     class="admin-only">Home</a>
      <a href="/log.html"       class="admin-only">Log Day</a>
      <a href="/reports.html"   class="admin-only">Reports</a>
      <a href="/history.html"   class="admin-only">History</a>
      <a href="/planner.html"   class="admin-only">Planner</a>
      <a href="/quality.html"   class="admin-only">Quality</a>
      <a href="/referrals.html" class="active admin-only">Referrals</a>
      <a href="/settings.html"  class="assistant-visible">Settings</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span class="topbar-user">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span id="username-text"></span>
    </span>
    <button class="logout" onclick="logout()">Sign Out</button>
  </div>
</div>

<!-- ── Page ─────────────────────────────────────────────── -->
<div class="page">
  <a class="back" onclick="location.href='/index.html'">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Dashboard
  </a>

  <div class="card">
    <div class="ref-page-header">
      <h2>Referral Programs</h2>
      <button class="btn" onclick="refOpenNew()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Program
      </button>
    </div>

    <div id="refSkeleton">
      <div class="skeleton" style="height:76px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:76px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:76px;border-radius:12px;"></div>
    </div>

    <div class="ref-card-list" id="refList"></div>
  </div>
</div>

<!-- ── Bottom nav ───────────────────────────────────────── -->
<nav class="bottom-nav">
  <div class="bottom-nav-items">
    <a href="/index.html"     class="bottom-nav-item admin-only">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
    </a>
    <a href="/planner.html"   class="bottom-nav-item admin-only">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Planner
    </a>
    <a href="/quality.html"   class="bottom-nav-item admin-only">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Quality
    </a>
    <a href="/referrals.html" class="bottom-nav-item active admin-only">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Referrals
    </a>
    <a href="/settings.html"  class="bottom-nav-item assistant-visible">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings
    </a>
  </div>
</nav>

<!-- ══════════════════════════════════════════════════════
     ADD / EDIT PROGRAM MODAL
══════════════════════════════════════════════════════ -->
<div class="ref-overlay" id="refProgramOverlay">
  <div class="ref-modal">

    <div class="ref-modal-head">
      <div>
        <div class="ref-modal-head-title" id="refModalTitle">New Referral Program</div>
        <div class="ref-modal-head-sub">Sponsor details and their referrals</div>
      </div>
      <button class="ref-modal-close" onclick="refCloseOverlay('refProgramOverlay')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="ref-modal-body">

      <p class="ref-section-label">Sponsor</p>
      <div class="ref-grid-3">
        <div class="ref-field"><label>First Name</label><input id="sp_first" placeholder="First name"></div>
        <div class="ref-field"><label>Last Name</label> <input id="sp_last"  placeholder="Last name"></div>
        <div class="ref-field"><label>Organization</label><input id="sp_org" placeholder="Company / union"></div>
      </div>
      <div class="ref-grid-3">
        <div class="ref-field"><label>Phone</label><input id="sp_phone" placeholder="(555) 000-0000" type="tel"></div>
        <div class="ref-field"><label>Email</label><input id="sp_email" placeholder="email@example.com" type="email"></div>
        <div class="ref-field"><label>Date</label> <input id="sp_date"  type="date"></div>
      </div>

      <hr class="ref-divider">

      <div class="ref-entries-header">
        <p class="ref-section-label" style="margin:0;">
          Referrals
          <span class="ref-count-badge" id="refCountBadge" style="margin-left:6px;">0</span>
        </p>
      </div>

      <div id="refEntriesContainer"></div>

      <button class="ref-add-btn" onclick="refAddEntry()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Referral
      </button>

    </div>

    <div class="ref-modal-footer">
      <button class="btn-secondary" onclick="refCloseOverlay('refProgramOverlay')">Cancel</button>
      <button class="btn" id="refSaveBtn" onclick="refSaveProgram()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Program
      </button>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     VIEW PROGRAM MODAL
══════════════════════════════════════════════════════ -->
<div class="ref-overlay" id="refViewOverlay">
  <div class="ref-modal">

    <div class="ref-modal-head">
      <div>
        <div class="ref-modal-head-title" id="refViewTitle"></div>
        <div class="ref-modal-head-sub"   id="refViewSub"></div>
      </div>
      <button class="ref-modal-close" onclick="refCloseOverlay('refViewOverlay')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="ref-modal-body">
      <p class="ref-section-label">Sponsor Info</p>
      <div class="ref-sponsor-info" id="refViewSponsorInfo"></div>
      <hr class="ref-divider">
      <div id="refViewReferrals"></div>
    </div>

    <div class="ref-modal-footer">
      <button class="btn-secondary" onclick="refCloseOverlay('refViewOverlay')">Close</button>
      <button class="btn" id="refViewEditBtn" onclick="refSwitchToEdit()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
    </div>

  </div>
</div>

<script src="/static/app.js"></script>
<script>
  if (localStorage.getItem("role") === "assistant") {
    document.querySelectorAll(".admin-only").forEach(function(el)   { el.style.display = "none"; });
    document.querySelectorAll(".assistant-visible").forEach(function(el) { el.style.display = ""; });
  }
  var u = localStorage.getItem("username");
  if (u) document.getElementById("username-text").innerText = u;
</script>
</body>
</html>
